[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
remappings = [
    "v4-core/=lib/v4-core/",
    "v4-periphery/=lib/v4-periphery/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
xlayer = "https://rpc.xlayer.tech"

[etherscan]
xlayer = { key = "${ETHERSCAN_API_KEY}", url = "https://www.oklink.com/api/v5/explorer/xlayer" }
